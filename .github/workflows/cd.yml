name: cd

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required for peaceiris/actions-gh-pages

jobs:
  cd:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node env 🏗
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies 👨🏻‍💻
        run: yarn --frozen-lockfile

      - name: Generate
        run: yarn run generate
        env:
          BASE_URL: /board-game-calendar/
          NODE_ENV: production
          G_API_KEY: ${{ secrets.G_API_KEY }}
          G_APP_ID: ${{ secrets.G_APP_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy functions to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_3AE94 }}' > /tmp/sa.json
          npx firebase-tools@latest deploy --only functions --project board-game-calendar-3ae94
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
